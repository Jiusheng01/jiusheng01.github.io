<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的 GitHub 主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      line-height: 1.6;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .hero {
      text-align: center;
      padding: 80px 20px;
    }
    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 20px;
      color: #cbd5e1;
    }
    .section {
      margin-top: 50px;
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 16px;
      backdrop-filter: blur(8px);
    }
    .section h2 {
      margin-bottom: 15px;
      color: #38bdf8;
    }
    .projects a {
      color: #7dd3fc;
      text-decoration: none;
    }
    .projects li {
      margin-bottom: 10px;
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      color: #94a3b8;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #38bdf8;
      color: #0f172a;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }
    .btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>你好，我是 XXX 👋</h1>
      <p>一名前端 / 后端 / 全栈开发者</p>
      <a class="btn" href="https://github.com/你的用户名" target="_blank">访问我的 GitHub</a>
    </section>

    <section class="section">
      <h2>关于我</h2>
      <p>
        我热爱编程，喜欢构建有趣、实用的项目。正在学习 Web 开发、自动化和 AI 相关技术。
      </p>
    </section>

    <section class="section">
      <h2>技能</h2>
      <p>HTML / CSS / JavaScript / React / Python / Git</p>
    </section>

    <section class="section projects">
      <h2>项目展示</h2>
      <ul>
        <li><a href="https://github.com/你的用户名/项目1" target="_blank">项目1</a> - 这里写项目简介</li>
        <li><a href="https://github.com/你的用户名/项目2" target="_blank">项目2</a> - 这里写项目简介</li>
        <li><a href="https://github.com/你的用户名/项目3" target="_blank">项目3</a> - 这里写项目简介</li>
      </ul>
    </section>

    <section class="section">
      <h2>联系我</h2>
      <p>Email: your_email@example.com</p>
    </section>

    <div class="footer">
      <p>© 2025 XXX. Built with GitHub Pages.</p>
    </div>
  </div>
</body>
</html>
